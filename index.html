<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interação</title>
</head>
<style>
    body {
        font:normal 14pt Arial, sans-serif;
        text-align: center;
        background: rgb(134, 16, 16);
    }
    div#container {
        font: normal 20pt Arial, sans-serif;
        background: white;
        color: black;
        width: 200px;
        height: 200px;
        line-height: 200px;
        margin: 0 auto;
        border: 1px solid black;
        cursor: pointer;
        
        border-radius: 10px;
        box-shadow: 4px 4px 8px rgba(255, 255, 255, 0.521);
    }
</style>
<body>
    <h1>Interação com JavaScript</h1>
    <div id="container" onclick="interact()">
        Interaja...
    </div>

    <script>
        var a = document.getElementById('container');

        a.addEventListener('click', clicar);
        a.addEventListener('mouseenter', entrar);
        a.addEventListener('mouseout', sair);

        function clicar() {
            a.innerText = 'clicou';
            a.style.background = 'red';
        }

        function entrar() {
            a.innerText = 'entrou';
            a.style.background = 'green';
        }

        function sair() {
            a.innerText = 'saiu';
            a.style.background = 'blue';
        }

    </script>
</body>
</html>
